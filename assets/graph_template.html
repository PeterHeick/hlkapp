<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>LaserLink Mapper – Netværksgraf</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #12121f; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  svg { width: 100vw; height: 100vh; }
  .link { stroke: #3a3a6a; stroke-opacity: 0.55; fill: none; }
  .node circle { stroke-width: 2px; cursor: pointer; transition: r 0.15s; }
  .node circle:hover { r: 14px; }
  .node text { font-size: 11px; fill: #d0d0e8; pointer-events: none; }
  .node.ok     circle { fill: #388e3c; stroke: #66bb6a; }
  .node.error  circle { fill: #c62828; stroke: #ef5350; }
  .node.orphan circle { fill: #e65100; stroke: #ffa726; }
  .node.pinned circle { stroke: #ffffff; stroke-dasharray: 4 2; }
  .node.deep   circle { fill: #1565c0; stroke: #42a5f5; }
  #tooltip {
    position: absolute; display: none;
    background: rgba(10,10,30,0.92); color: #e8e8f8;
    padding: 8px 13px; border-radius: 7px; font-size: 12px;
    border: 1px solid #3a3a6a; max-width: 420px; word-break: break-all;
    pointer-events: none;
  }
  #legend {
    position: absolute; top: 10px; left: 10px;
    background: rgba(10,10,30,0.78); padding: 9px 14px;
    border-radius: 8px; color: #bbb; font-size: 12px; line-height: 1.8;
  }
  #legend b { color: #e8e8f8; }
  #legend span { display: inline-block; width: 11px; height: 11px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  #stats {
    position: absolute; top: 10px; right: 10px;
    background: rgba(10,10,30,0.78); padding: 9px 14px;
    border-radius: 8px; color: #bbb; font-size: 12px; line-height: 1.8;
  }
  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.65); padding: 5px 14px;
    border-radius: 6px; color: #888; font-size: 11px; pointer-events: none;
  }
  #search {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.85); color: #e8e8f8;
    border: 1px solid #3a3a6a; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; width: 240px;
    outline: none;
  }
  #search:focus { border-color: #ffd600; }
  #search::placeholder { color: #555; }
</style>
</head>
<body>
<div id="tooltip"></div>
<div id="legend">
  <b>Forklaring</b><br>
  <span style="background:#388e3c"></span>OK &nbsp;
  <span style="background:#c62828"></span>Fejl (4xx/5xx)<br>
  <span style="background:#e65100"></span>Forældrelos &nbsp;
  <span style="background:#1565c0"></span>Dybt link (&gt;4 klik)
</div>
<div id="stats"></div>
<input id="search" type="text" placeholder="Søg efter side…" autocomplete="off" spellcheck="false">
<div id="hint">Klik: se forbindelser &nbsp;·&nbsp; Træk: flyt node + naboer &nbsp;·&nbsp; Dobbeltklik: frigiv fastlåst node</div>
<svg>
  <defs>
    <!-- Default: dim blue-gray arrow -->
    <marker id="arr-default" viewBox="0 -5 10 10" refX="9" refY="0"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,-4L10,0L0,4Z" fill="#3a3a6a" fill-opacity="0.7"/>
    </marker>
    <!-- Active: yellow arrow for selected links -->
    <marker id="arr-active" viewBox="0 -5 10 10" refX="9" refY="0"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,-4L10,0L0,4Z" fill="#ffd600"/>
    </marker>
    <!-- Dim: nearly invisible arrow for unrelated links when selection active -->
    <marker id="arr-dim" viewBox="0 -5 10 10" refX="9" refY="0"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,-4L10,0L0,4Z" fill="#3a3a6a" fill-opacity="0.15"/>
    </marker>
  </defs>
  <g id="root"></g>
</svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const data = __GRAPH_DATA__;

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("svg").attr("viewBox", [0, 0, W, H]);
const g   = d3.select("#root").html("");
const tip = document.getElementById("tooltip");
const statsEl = document.getElementById("stats");

// Stats summary
const counts = data.nodes.reduce((a, n) => { a[n.type] = (a[n.type]||0)+1; return a; }, {});
statsEl.innerHTML = `<b>Sider total: ${data.nodes.length}</b><br>
  OK: ${counts.ok||0} &nbsp; Fejl: ${counts.error||0}<br>
  Forældreløse: ${counts.orphan||0} &nbsp; Dybe: ${counts.deep||0}`;

const sim = d3.forceSimulation(data.nodes)
  .force("link",    d3.forceLink(data.links).id(d => d.id).distance(200).strength(0.4))
  .force("charge",  d3.forceManyBody().strength(-600))
  .force("center",  d3.forceCenter(W/2, H/2).strength(0.03))
  .force("collide", d3.forceCollide(55))
  .force("orphan-x", d3.forceX(W/2).strength(d => d.type === 'orphan' ? 0.15 : 0))
  .force("orphan-y", d3.forceY(H/2).strength(d => d.type === 'orphan' ? 0.15 : 0));

function nodeRadius(d) {
  return 7 + Math.min(d.inbound || 0, 8) * 1.4;
}


const link = g.append("g").selectAll("line")
  .data(data.links).join("line")
  .attr("class", "link")
  .attr("stroke-width", 1.2)
  .attr("marker-end", "url(#arr-default)");

const node = g.append("g").selectAll("g")
  .data(data.nodes).join("g")
  .attr("class", d => `node ${d.type}`)
  .call(d3.drag()
    .on("start", (e, d) => {
      if (!e.active) sim.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
      d._dragStartX = e.x;
      d._dragStartY = e.y;
      d._neighbors = [];
      data.links.forEach(l => {
        let nb = null;
        if (l.source === d) nb = l.target;
        else if (l.target === d) nb = l.source;
        if (nb) {
          nb.fx = nb.x; nb.fy = nb.y;
          d._neighbors.push({ node: nb, ox: nb.x, oy: nb.y });
        }
      });
    })
    .on("drag", (e, d) => {
      const dx = e.x - d._dragStartX;
      const dy = e.y - d._dragStartY;
      d.fx = e.x; d.fy = e.y;
      d._neighbors.forEach(({ node: nb, ox, oy }) => {
        nb.fx = ox + dx; nb.fy = oy + dy;
      });
    })
    .on("end", (e, d) => {
      if (!e.active) sim.alphaTarget(0);
      // Keep fx/fy — nodes stay pinned where dropped
      node.filter(n => n === d || (d._neighbors && d._neighbors.some(nb => nb.node === n)))
        .classed("pinned", true);
    }));

node.append("circle").attr("r", d => nodeRadius(d));
node.append("text").attr("dx", 13).attr("dy", 4).text(d => d.label);

// ── Node selection + link highlight ──────────────────────────────────────────
let activeNode = null;

function clearSelection() {
  activeNode = null;
  link
    .style("stroke",         "#3a3a6a")
    .style("stroke-opacity", 0.55)
    .style("stroke-width",   1.2)
    .attr("marker-end",     "url(#arr-default)");
  node.select("circle").attr("opacity", 1).attr("stroke-width", 2);
  node.select("text").attr("opacity", 1);
}

function selectNode(d) {
  activeNode = d;
  const connectedNodes = new Set([d]);
  data.links.forEach(l => {
    if (l.source === d) connectedNodes.add(l.target);
    if (l.target === d) connectedNodes.add(l.source);
  });

  link
    .style("stroke",         l => (l.source === d || l.target === d) ? "#ffd600" : "#3a3a6a")
    .style("stroke-opacity", l => (l.source === d || l.target === d) ? 1.0 : 0.08)
    .style("stroke-width",   l => (l.source === d || l.target === d) ? 1.8 : 1.2)
    .attr("marker-end",     l => (l.source === d || l.target === d) ? "url(#arr-active)" : "url(#arr-dim)");

  node.select("circle")
    .attr("opacity",      n => connectedNodes.has(n) ? 1.0 : 0.2)
    .attr("stroke-width", n => n === d ? 4 : 2);
  node.select("text")
    .attr("opacity", n => connectedNodes.has(n) ? 1.0 : 0.15);
}

node.on("click", (e, d) => {
  e.stopPropagation();
  document.getElementById("search").value = "";
  if (activeNode === d) clearSelection();
  else selectNode(d);
});

node.on("dblclick", (e, d) => {
  e.stopPropagation();
  d.fx = null; d.fy = null;
  node.filter(n => n === d).classed("pinned", false);
  sim.alphaTarget(0.1).restart();
  setTimeout(() => sim.alphaTarget(0), 800);
});

svg.on("click", () => {
  document.getElementById("search").value = "";
  clearSelection();
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  const query = this.value.trim().toLowerCase();
  activeNode = null;

  if (!query) {
    clearSelection();
    return;
  }

  const matches = data.nodes.filter(n => (n.title || n.label).toLowerCase().includes(query));
  const matchSet = new Set(matches);

  if (matches.length === 1) {
    // Exact single match: show connections with yellow lines
    selectNode(matches[0]);
  } else {
    // Multiple matches: highlight matching nodes only, dim everything else
    link
      .style("stroke",         "#3a3a6a")
      .style("stroke-opacity", 0.06)
      .style("stroke-width",   1.2)
      .attr("marker-end",      "url(#arr-dim)");
    node.select("circle")
      .attr("opacity",      n => matchSet.has(n) ? 1.0 : 0.12)
      .attr("stroke-width", 2);
    node.select("text")
      .attr("opacity", n => matchSet.has(n) ? 1.0 : 0.08);
  }
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
node
  .on("mouseover", (e, d) => {
    tip.style.display = "block";
    tip.innerHTML = `<b>${d.label}</b><br>${d.url}<br>
      Status: <b>${d.status}</b> &nbsp; Dybde: <b>${d.depth}</b> &nbsp; Indgående: <b>${d.inbound||0}</b>`;
  })
  .on("mousemove", e => { tip.style.left=(e.pageX+16)+"px"; tip.style.top=(e.pageY-8)+"px"; })
  .on("mouseout",  () => { tip.style.display="none"; });

// Shorten line so the arrowhead lands just outside the target circle
sim.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const r = nodeRadius(d.target) + 8;
      return d.target.x - (dx / dist) * r;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const r = nodeRadius(d.target) + 8;
      return d.target.y - (dy / dist) * r;
    });
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

svg.call(d3.zoom().scaleExtent([0.15,10])
  .on("zoom", e => g.attr("transform", e.transform)));
</script>
</body>
</html>
