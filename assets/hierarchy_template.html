<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>LaserLink Mapper – Hierarki</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #12121f; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  svg { width: 100vw; height: 100vh; }
  .link { fill: none; stroke: #3a3a6a; stroke-width: 1.5px; }
  .node circle { cursor: pointer; stroke-width: 2px; transition: r 0.15s; }
  .node circle:hover { r: 11px; }
  .node text { font-size: 12px; fill: #d0d0e8; pointer-events: none; }
  .node.ok     circle { fill: #388e3c; stroke: #66bb6a; }
  .node.error  circle { fill: #c62828; stroke: #ef5350; }
  .node.orphan circle { fill: #e65100; stroke: #ffa726; }
  .node.deep   circle { fill: #1565c0; stroke: #42a5f5; }
  .node.folder circle { fill: #4a4a7a; stroke: #7070aa; }
  #tooltip {
    position: absolute; display: none;
    background: rgba(10,10,30,0.92); color: #e8e8f8;
    padding: 8px 13px; border-radius: 7px; font-size: 12px;
    border: 1px solid #3a3a6a; max-width: 440px; word-break: break-all;
    pointer-events: none;
  }
  #legend {
    position: absolute; top: 10px; left: 10px;
    background: rgba(10,10,30,0.78); padding: 9px 14px;
    border-radius: 8px; color: #bbb; font-size: 12px; line-height: 1.8;
  }
  #legend span { display: inline-block; width: 11px; height: 11px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  #hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: #666; font-size: 11px;
  }
</style>
</head>
<body>
<div id="tooltip"></div>
<div id="legend">
  <b>Hierarki</b> — klik node for at folde ud/ind<br>
  <span style="background:#388e3c"></span>OK &nbsp;
  <span style="background:#c62828"></span>Fejl<br>
  <span style="background:#e65100"></span>Forældrelos &nbsp;
  <span style="background:#1565c0"></span>Dybt link<br>
  <span style="background:#4a4a7a"></span>Mappe (ingen side)
</div>
<div id="hint">Scroll for at zoome &nbsp;·&nbsp; Træk for at panorere &nbsp;·&nbsp; Klik node for at folde</div>
<svg><g id="root"></g></svg>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const treeData = __TREE_DATA__;

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("svg").attr("viewBox", [0, 0, W, H]);
const g   = d3.select("#root");
const tip = document.getElementById("tooltip");

const DURATION = 400;
let nodeId = 0;

const treeFn = d3.tree().nodeSize([26, 220]);

// Collapse all children beyond depth 2 on load
function collapse(d) {
    if (d.children && d.depth >= 2) {
        d._children = d.children;
        d.children = null;
        d._children.forEach(collapse);
    } else if (d.children) {
        d.children.forEach(collapse);
    }
}

const root = d3.hierarchy(treeData);
root.x0 = H / 2;
root.y0 = 0;
collapse(root);
update(root);

function update(source) {
    const nodes = treeFn(root).descendants();
    const links = treeFn(root).links();

    nodes.forEach(d => { d.y = d.depth * 220; });

    // Nodes
    const node = g.selectAll("g.node")
        .data(nodes, d => d.id || (d.id = ++nodeId));

    const nodeEnter = node.enter().append("g")
        .attr("class", d => `node ${d.data.url ? d.data.type : "folder"}`)
        .attr("transform", `translate(${source.y0},${source.x0})`)
        .on("click", (e, d) => { toggle(d); update(d); })
        .on("mouseover", (e, d) => {
            if (!d.data.url) return;
            tip.style.display = "block";
            tip.innerHTML = `<b>/${d.data.name}</b><br>${d.data.url}<br>
              Status: <b>${d.data.status}</b> &nbsp; Dybde: <b>${d.data.depth}</b> &nbsp; Ord: <b>${d.data.word_count}</b>`;
        })
        .on("mousemove", e => { tip.style.left=(e.pageX+16)+"px"; tip.style.top=(e.pageY-8)+"px"; })
        .on("mouseout",  () => { tip.style.display="none"; });

    nodeEnter.append("circle").attr("r", 7)
        .style("stroke-dasharray", d => d.data.url ? "none" : "4 2");

    nodeEnter.append("text")
        .attr("dy", 4)
        .attr("x", d => (d.children || d._children) ? -12 : 12)
        .attr("text-anchor", d => (d.children || d._children) ? "end" : "start")
        .text(d => d.data.name || "/")
        .clone(true).lower().attr("stroke", "#12121f").attr("stroke-width", 3);

    const nodeUpdate = nodeEnter.merge(node);
    nodeUpdate.transition().duration(DURATION)
        .attr("transform", d => `translate(${d.y},${d.x})`);
    nodeUpdate.select("circle")
        .attr("r", d => (d.children || d._children) ? 9 : 7)
        .style("fill-opacity", d => d._children ? 0.4 : 1);

    node.exit().transition().duration(DURATION)
        .attr("transform", `translate(${source.y},${source.x})`)
        .remove();

    // Links
    const link = g.selectAll("path.link").data(links, d => d.target.id);

    link.enter().insert("path", "g")
        .attr("class", "link")
        .attr("d", () => {
            const o = {x: source.x0, y: source.y0};
            return diagonal({source: o, target: o});
        })
      .merge(link).transition().duration(DURATION).attr("d", diagonal);

    link.exit().transition().duration(DURATION)
        .attr("d", () => {
            const o = {x: source.x, y: source.y};
            return diagonal({source: o, target: o});
        }).remove();

    nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

function diagonal(d) {
    return `M${d.source.y},${d.source.x}
            C${(d.source.y + d.target.y)/2},${d.source.x}
             ${(d.source.y + d.target.y)/2},${d.target.x}
             ${d.target.y},${d.target.x}`;
}

function toggle(d) {
    if (d.children) { d._children = d.children; d.children = null; }
    else             { d.children = d._children; d._children = null; }
}

svg.call(d3.zoom().scaleExtent([0.1, 8])
    .on("zoom", e => g.attr("transform", e.transform)));
</script>
</body>
</html>
