components:
  schemas:
    accessTemplate_expand:
      title: optional
      description: "List of access template fields to return in 'accessTemplate' object field. If its not filled, only accessTemplateId will be filled."
      type: string
      format: 'aaa,bbb,ccc,...'
      writeOnly: true
      example: 'accessTemplateId,accessTemplateName'
    accessTemplateId:
      title: 'AccessTemplate id'
      description: 'The unique identifier of a access template'
      type: integer
      readOnly: true
      example: 1999999
    accessTemplate_link:
      title: AccessTemplate
      description: AccessTemplate
      properties:
        accessTemplateId:
          $ref: '#/components/schemas/accessTemplateId'
      type: object
      readOnly: true
      nullable: true
    accessTemplate_create:
      title: AccessTemplate
      description: AccessTemplate
      required:
        - customerId
      properties:
        customerId:
          type: integer
          writeOnly: true
      type: object
    accessTemplate:
      title: AccessTemplate
      description: AccessTemplate
      required:
        - accessTemplateId
      properties:
        accessTemplateId:
          $ref: '#/components/schemas/accessTemplateId'
        accessTemplateName:
          description: 'Access template description'
          type: string
          example: Supporter
      type: object
    administrator_expand:
      title: optional
      description: "List of administrator fields to return in 'administrator' object field. If its not filled, only administratorId will be filled."
      type: string
      format: 'aaa,bbb,ccc,...'
      writeOnly: true
      example: 'administratorId,administratorName'
    administratorId:
      title: 'Administrator id'
      description: 'The unique identifier of a administrator'
      type: integer
      readOnly: true
      example: 1999999
    administrator_link:
      title: Administrator
      description: Administrator
      properties:
        administratorId:
          $ref: '#/components/schemas/administratorId'
      type: object
      readOnly: true
      nullable: true
    administrator_create:
      title: Administrator
      description: Administrator
      required:
        - administratorName
        - administratorEmail
      properties:
        administratorId:
          $ref: '#/components/schemas/administratorId'
        accessTemplate:
          $ref: '#/components/schemas/accessTemplate_link'
        accessTemplateId:
          type: integer
          writeOnly: true
        administratorInitials:
          type: string
          example: JD
        administratorName:
          type: string
          example: 'John Doe'
        administratorEmail:
          type: string
          example: jd@example.com
        administratorMobile:
          type: string
          example: '12345678'
        administratorExternalId:
          description: 'Id in external system when administrator is imported'
          type: integer
          example: 8844001
        administratorUUID:
          description: 'Used for singlesignon'
          type: string
          example: 36392ecf-20e6-4a39-bd69-261ab66112ca
      type: object
    administrator:
      title: Administrator
      description: Administrator
      properties:
        administratorId:
          $ref: '#/components/schemas/administratorId'
        accessTemplate:
          $ref: '#/components/schemas/accessTemplate_link'
        accessTemplateId:
          type: integer
          writeOnly: true
        administratorInitials:
          type: string
          example: JD
        administratorName:
          type: string
          example: 'John Doe'
        administratorEmail:
          type: string
          example: jd@example.com
        administratorMobile:
          type: string
          example: '12345678'
        administratorExternalId:
          description: 'Id in external system when administrator is imported'
          type: integer
          example: 8844001
        administratorUUID:
          description: 'Used for singlesignon'
          type: string
          example: 36392ecf-20e6-4a39-bd69-261ab66112ca
      type: object
