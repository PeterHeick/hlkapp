  -
    name: 'Reward program'
    description: 'There is two kinds of reward programs, `1` `Fixed points` and `2` `Percentage of price`.<br>For `Fixed points` no decimals are allowed, so all point values are integers only<br>and for `Percentage of price` all point values are alowed to have 2 decimals.'
  -
    name: 'Voucher status'
    description: "VoucherStatusId can be one of the following:\r\n\r\n| StatusId | Description |\r\n|:-------------:| ------------- |\r\n| `1` | Payment pending |\r\n| `2` | Active |\r\n| `3` | Cancelled |\r\n| `4` | Used up |\r\n"
  -
    name: 'Error codes'
    description: "If a API call failes, it will return one of the following error codes\r\n\r\n| Errorcode | Description |\r\n|:-------------:| ------------- |\r\n| `400` | Bad request |\r\n| `401` | Unauthorized. Authentication token is missing or invalid |\r\n| `403` | Failed to update or delete due to validation |\r\n| `404` | Object (Customer, Voucher etc) not found |\r\n| `429` | Too many requests |\r\n"
  -
    name: 'PHP Examples'
    description: "\r\nList customers example:\r\n\r\n>     $bearerToken = '*insert your bearer token*';\r\n\t$ch = curl_init();\r\n\tcurl_setopt($ch, CURLOPT_URL, 'https://app.geckobooking.dk/api/v1/customer');\r\n\tcurl_setopt($ch, CURLOPT_HTTPHEADER, array('Authorization: bearer '. $bearerToken, 'Content-Type: application/json'));\r\n\tcurl_setopt($ch, CURLOPT_USERAGENT, 'PHP-API/1.0');\r\n\tcurl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\r\n\tcurl_setopt($ch, CURLOPT_CUSTOMREQUEST, 'GET');\r\n\t$result = curl_exec($ch);\r\n\t$http_code = curl_getinfo($ch, CURLINFO_HTTP_CODE);\r\n\t$listResult = json_decode($result);\r\n"
